<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>La Vaillante Basket Club</title>
  </head>
  <body>
    <nav>
      <div class="navbar">
        <div class="nav-logo">
          <img src="./public/logo/onglet_pic.webp" alt="logo de la vaillante" />
        </div>
        <div class="nav-link">
          <ul>
            <li><a href="#" class="linkHamb">Accueil</a></li>
            <li><a href="#test" class="linkHamb">Actu & Résultats</a></li>
            <li><a href="" class="linkHamb">Nos Equipes</a></li>
            <li><a href="" class="linkHamb">La Boutique</a></li>
            <li><a href="" class="linkHamb">Contacts</a></li>
          </ul>
        </div>

        <!-- Hamb Menu -->
        <div class="navbar-menu">
          <input type="checkbox" id="menu-toggle" class="checkbox" />
          <label for="menu-toggle" class="button">
            <span class="icon"></span>
          </label>
          <div class="background">&nbsp;</div>
        </div>
        <!-- End Hamb Menu -->
      </div>
    </nav>

    <header>
      <div class="header-title">
        <h1>La Vaillante</h1>
        <h2>Basket Club</h2>
      </div>
    </header>

    <main>
      <div class="main-container">
        <div class="main-container-resultats">
          <span id="test"></span>
          <div
            class="scorenco-widget"
            data-widget-type="previous-next"
            data-widget-id="107079"
            style="
              background: #f2f5f9;
              height: 500px;
              display: flex;
              align-items: center;
              justify-content: center;
              flex-direction: column;
              text-transform: uppercase;
              font-family: sans-serif;
              font-weight: bolder;
              gap: 9px;
              color: #1e457b;
            "
          >
            <div class="ldsdr"></div>
            Score'n'co - Vaillante Immaculee St Nazaire
          </div>

          <style>
            .ldsdr {
              display: inline-block;
              width: 80px;
              height: 80px;
            }
            .ldsdr:after {
              content: " ";
              display: block;
              width: 64px;
              height: 64px;
              margin: 8px;
              border-radius: 50%;
              border: 6px solid #1e457b;
              border-color: #1e457b transparent;
              animation: ldsdr 1.2s linear infinite;
            }
            @keyframes ldsdr {
              0% {
                transform: rotate(0deg);
              }
              100% {
                transform: rotate(360deg);
              }
            }
          </style>
          <script
            async
            defer
            src="https://widgets.scorenco.com/host/widgets.js"
          ></script>
        </div>
        <div class="main-container-classement">
          <div
            class="scorenco-widget"
            data-widget-type="ranking"
            data-widget-id="107080"
            style="
              background: #f2f5f9;
              height: 500px;
              display: flex;
              align-items: center;
              justify-content: center;
              flex-direction: column;
              text-transform: uppercase;
              font-family: sans-serif;
              font-weight: bolder;
              gap: 9px;
              color: #1e457b;
            "
          >
            <div class="ldsdr"></div>
            Score'n'co - Vaillante Immaculee St Nazaire
          </div>
          <style>
            .ldsdr {
              display: inline-block;
              width: 80px;
              height: 80px;
            }
            .ldsdr:after {
              content: " ";
              display: block;
              width: 64px;
              height: 64px;
              margin: 8px;
              border-radius: 50%;
              border: 6px solid #1e457b;
              border-color: #1e457b transparent;
              animation: ldsdr 1.2s linear infinite;
            }
            @keyframes ldsdr {
              0% {
                transform: rotate(0deg);
              }
              100% {
                transform: rotate(360deg);
              }
            }
          </style>
          <script
            async
            defer
            src="https://widgets.scorenco.com/host/widgets.js"
          ></script>
        </div>
      </div>
    </main>

    <script type="module" defer src="/index.js"></script>
  </body>
</html>
